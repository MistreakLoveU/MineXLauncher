<div class="main-panel">
  <div class="top-nav">
    <ul>
      <li class="selected" onclick="navigate.home.game()">Game</li>
      <li onclick="navigate.home.clients()">Clients</li>
      <li onclick="navigate.home.archive()">Archive</li>
      <li onclick="navigate.home.downloads()">Offline Downloads</li>
    </ul>
  </div>

  <div class="main-content">
    <img class="cover-image" src="/resources/images/covers/minecraft.webp" />
  </div>

  <div class="action-bar">
    <div class="installations">
      <span class="selector" onclick="versionSelector.toggle()">Select a version</span>
      <div class="options">
        <div onclick="game.select('/games/clients/tuffwasm1122/tuffwasm1122.html', 'Tuff WASM 1.12.2')">
          <img src="/resources/images/icons/clients/eagler.webp" />
          <span>Tuff WASM 1.12.2</span>
        </div>
      </div>
    </div>
    <button class="play-button" onclick="game.play()">Play</button>
  </div>
</div>
