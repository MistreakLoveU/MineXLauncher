<!doctype html>
<html lang="en" style="display: none">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MineXLauncher - Hacked Clients</title>
    <link rel="icon" type="image/webp" href="/resources/images/icons/favicon.webp" />
    <link rel="preload" href="/resources/images/covers/clients.webp" as="image" />
    <link rel="prefetch" href="/game/" as="document" />
    <link rel="prefetch" href="/clients/" as="document" />
    <link rel="prefetch" href="/archive/" as="document" />
    <link rel="prefetch" href="/downloads/" as="document" />
    <link rel="stylesheet" href="/resources/styles/themes/default.css" />
    <link rel="stylesheet" id="theme" onload="document.documentElement.style.display = ''" />
    <script src="/resources/scripts/google-tag.js"></script>
    <script src="/resources/scripts/main.js"></script>
  </head>
  <body>
    <div class="ads-container">
      <ins class="adsbygoogle" style="display: block" data-ad-client="ca-pub-1132419379737567" data-ad-slot="3280170072" data-ad-format="auto" data-full-width-responsive="true"></ins>
    </div>
    <div class="launcher">
      <span class="title-bar">MineXLauncher</span>
      <div class="content">
        <div class="sidebar">
          <span class="username"></span>
          <nav class="nav-bar">
            <li onclick="navigate.updates()"><img src="/resources/images/icons/nav/updates.webp" decoding="async" /><span>Updates</span></li>
            <li class="selected" onclick="navigate.hackedClients()"><img src="/resources/images/icons/nav/clients.webp" decoding="async" /><span>Hacked Clients</span></li>
            <li onclick="navigate.game()"><img src="/resources/images/icons/nav/game.webp" decoding="async" /><span>Game</span></li>
            <li onclick="navigate.servers()"><img src="/resources/images/icons/nav/servers.webp" decoding="async" /><span>Server List</span></li>
            <li onclick="navigate.addons.mods()"><img src="/resources/images/icons/nav/mods.webp" decoding="async" /><span>Mods</span></li>
            <li onclick="navigate.articles()"><img src="/resources/images/icons/nav/articles.webp" decoding="async" /><span>Tutorials</span></li>
            <li onclick="navigate.settings.general()"><img src="/resources/images/icons/nav/settings.webp" decoding="async" /><span>Settings</span></li>
          </nav>
        </div>
        <div class="main-panel">
          <div class="top-nav">
            <ul>
              <li onclick="navigate.game()">Game</li>
              <li onclick="navigate.clients()">Clients</li>
              <li class="selected" onclick="navigate.hackedClients()">Hacked Clients</li>
              <li onclick="navigate.archive()">Archive</li>
              <li onclick="navigate.downloads()">Offline Downloads</li>
            </ul>
          </div>
          <div class="main-content">
            <img class="cover-image" src="/resources/images/covers/clients.webp" decoding="async" fetchpriority="high" />
            <div class="installations">
              <div>
                <span class="selector" onclick="versionSelector.toggle()">Select a hacked client</span>
                <div class="options">
                  <div onclick="game.select('/hacked-clients/DragonX2.html', 'DragonX2')">
                    <img src="/resources/images/icons/clients/eagler.webp" decoding="async" />
                    <span>DragonX2</span>
                  </div>
                  <div onclick="game.select('/hacked-clients/WurstX.html', 'WurstX')">
                    <img src="/resources/images/icons/clients/eagler.webp" decoding="async" />
                    <span>WurstX</span>
                  </div>
                </div>
              </div>
              <button onclick="game.play()">Play</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
